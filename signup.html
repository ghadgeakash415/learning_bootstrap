<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up Page</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      font-family: Arial, sans-serif;
    }

    .signup-container {
      min-height: 100vh;
    }

    .signup-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease;
    }

    .signup-title {
      font-weight: bold;
      color: #212529;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px 12px;
    }

    .signup-btn {
      background-color: #212529;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      transition: all 0.3s ease;
    }

    .signup-btn:hover {
      background-color: #000;
      transform: translateY(-2px);
    }

    .login-link {
      text-decoration: none;
      color: #212529;
      font-weight: 500;
    }

    .login-link:hover {
      text-decoration: underline;
    }

    #message {
      display: none;
      font-weight: 500;
      text-align: center;
      margin-top: 15px;
      color: green;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center signup-container">
    <div class="card signup-card p-4">
      <div class="card-body">
        <h2 class="text-center mb-4 signup-title">Sign Up</h2>

        <form id="signupForm">
          <div class="mb-3">
            <label for="fullname" class="form-label">Full Name</label>
            <input
              type="text"
              class="form-control"
              id="fullname"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="signupEmail" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control"
              id="signupEmail"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="signupPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="signupPassword"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              placeholder="Confirm your password"
              required
            />
          </div>

          <button type="submit" class="btn signup-btn w-100">Sign Up</button>

          <p id="message">Sign Up Account Successfully</p>

          <p class="text-center mt-3 mb-0">
            Already have an account?
            <a href="login.html" class="login-link">Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(event) {
      event.preventDefault();

      let fullname = document.getElementById("fullname").value.trim();
      let email = document.getElementById("signupEmail").value.trim();
      let password = document.getElementById("signupPassword").value.trim();
      let confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (fullname === "" || email === "" || password === "" || confirmPassword === "") {
        alert("Please fill all fields");
        return;
      }

      if (password !== confirmPassword) {
        alert("Password and Confirm Password do not match");
        return;
      }

      let userData = {
        fullname: fullname,
        email: email,
        password: password
      };

      localStorage.setItem("userAccount", JSON.stringify(userData));

      document.getElementById("message").style.display = "block";

      setTimeout(function() {
        window.location.href = "login.html";
      }, 1500);
    });
  </script>

</body>
</html>
